<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti, Nicky 🌹</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
height:100vh;
background:radial-gradient(circle at 50% 0%, #4a2c38, #25181e);
display:flex;
justify-content:center;
align-items:flex-end;
font-family:'Segoe UI',sans-serif;
overflow:hidden;
}

/* RAMO */

.container{
position:relative;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.bouquet-wrapper{
position:relative;
width:400px;
height:500px;
animation:deliverBouquet 2.5s cubic-bezier(0.19,1,0.22,1) forwards;
transform:translateY(150%);
}

@keyframes deliverBouquet{
0%{transform:translateY(150%) scale(0.8);}
70%{transform:translateY(-30px) scale(1.05);}
100%{transform:translateY(0) scale(1);}
}

/* PAPEL */

.paper-cone{
position:absolute;
bottom:50px;
left:50%;
transform:translateX(-50%);
width:200px;
height:300px;
background:linear-gradient(to right,#6d4c41,#8d6e63,#6d4c41);
clip-path:polygon(0 0,100% 0,80% 100%,20% 100%);
z-index:0;
}

.stems{
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
width:40px;
height:150px;
background:repeating-linear-gradient(90deg,#1b5e20,#2e7d32 5px,#1b5e20 10px);
z-index:2;
border-radius:0 0 10px 10px;
}

/* FLORES */

.flowers-container{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
width:350px;
height:300px;
}

.flower{
position:absolute;
width:100px;
height:100px;
transform:scale(0);
animation:bloom .8s forwards;
}

@keyframes bloom{
to{transform:scale(var(--scale));}
}

.petal{
position:absolute;
left:50%;
bottom:50%;
width:15px;
height:50px;
background:linear-gradient(to top,var(--color-dark),var(--color-light));
transform-origin:bottom center;
border-radius:50%;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:25%;
height:25%;
background:#5d4037;
border-radius:50%;
}

/* TARJETA */

.card{
position:absolute;
top:-170px;
left:50%;
transform:translateX(-50%);
background:#fff;
padding:20px 30px;
border-radius:8px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
border:2px solid #f8bbd0;
opacity:0;
animation:cardFloat 1s forwards;
animation-delay:3s;
z-index:1000;
text-align:center;
}

@keyframes cardFloat{
from{opacity:0;transform:translateX(-50%) translateY(20px);}
to{opacity:1;transform:translateX(-50%) translateY(0);}
}

h1{font-size:1.6rem;color:#880e4f;margin:0;}
p{font-size:1.1rem;color:#555;margin:8px 0 0;}

/* BOTON */

.btn-continuar{
position:fixed;
bottom:50px;
z-index:2000;
padding:15px 30px;
font-size:1.2rem;
background:#f48fb1;
color:white;
border:none;
border-radius:50px;
cursor:pointer;
box-shadow:0 4px 15px rgba(244,143,177,0.4);
transition:.3s;
font-weight:bold;
}

.btn-continuar:hover{
transform:scale(1.1);
background:#ec407a;
}

/* GALAXIA */

.galaxy-container{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
pointer-events:none;
display:none;
z-index:3000;
}

.galaxy-phrase{
position:absolute;
white-space:nowrap;
animation:orbit linear infinite;
opacity:0;
}

@keyframes orbit{
0%{transform:rotate(0deg) translateX(var(--radius)) rotate(0deg);opacity:0;}
10%{opacity:1;}
90%{opacity:1;}
100%{transform:rotate(360deg) translateX(var(--radius)) rotate(-360deg);opacity:0;}
}

.fade-out{
transition:opacity 2s, transform 2s;
opacity:0;
transform:scale(.5) translateY(100px);
}
</style>
</head>

<body>

<div class="container">
<div class="bouquet-wrapper">

<div class="card">
<h1>Para ti, Nicky 💖</h1>
<p>Con mucho amorcito.</p>
</div>

<div class="paper-cone"></div>
<div class="flowers-container" id="flowersBox"></div>
<div class="stems"></div>

</div>
</div>

<button id="btnContinuar" class="btn-continuar">Ver algo especial ✨</button>

<div id="galaxyContainer" class="galaxy-container"></div>

<!-- MUSICA -->
<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

const box=document.getElementById('flowersBox');

for(let i=0;i<10;i++){

let flower=document.createElement("div");
flower.className="flower";

flower.style.left=Math.random()*300+"px";
flower.style.bottom=Math.random()*200+"px";

flower.style.setProperty('--scale',Math.random()+0.7);

let head=document.createElement("div");

for(let j=0;j<12;j++){

let p=document.createElement("div");
p.className="petal";

p.style.setProperty('--color-light','#f48fb1');
p.style.setProperty('--color-dark','#ad1457');

p.style.transform=`rotate(${j*30}deg) translateY(-20px)`;

head.appendChild(p);
}

let center=document.createElement("div");
center.className="center";

head.appendChild(center);

flower.appendChild(head);

box.appendChild(flower);
}

/* GALAXIA */

const frases=[
"Eres magia",
"Mi lugar favorito",
"Contigo siempre",
"Nicky eres única",
"Brillas como nadie",
"Tu sonrisa es luz",
"Te quiero",
"Princesa",
"Te amo mucho",
"Hermosa"
];

const btn=document.getElementById('btnContinuar');
const bouquet=document.querySelector('.bouquet-wrapper');
const galaxy=document.getElementById('galaxyContainer');
const musica=document.getElementById('musica');

btn.addEventListener('click',()=>{

musica.volume=0;
musica.play();

/* FADE IN MUSICA */

let v=0;
let fade=setInterval(()=>{

v+=0.02;
musica.volume=v;

if(v>=0.8) clearInterval(fade);

},200);

/* TRANSICION */

bouquet.classList.add('fade-out');
btn.style.display='none';

galaxy.style.display='block';

crearGalaxia();

});

function crearGalaxia(){

for(let i=0;i<60;i++){

let span=document.createElement('span');

span.className='galaxy-phrase';

span.innerText=frases[Math.floor(Math.random()*frases.length)];

span.style.left='50%';
span.style.top='50%';

let radius=Math.random()*400+50;
let duration=Math.random()*10+8;

span.style.setProperty('--radius',radius+"px");

span.style.animationDuration=duration+"s";

span.style.fontSize=(Math.random()*1.5+0.7)+"rem";

const colors=['#f8bbd0','#e1bee7','#fff','#b3e5fc'];

span.style.color=colors[Math.floor(Math.random()*colors.length)];

galaxy.appendChild(span);

}

}

</script>

</body>
</html>
