<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti, Nicky 🌹</title>
<style>
/* --- ENTORNO --- */
* { box-sizing: border-box; }

body {
margin: 0;
height: 100vh;
background: radial-gradient(circle at 50% 0%, #4a2c38, #25181e);
display: flex;
justify-content: center;
align-items: flex-end;
font-family: 'Segoe UI', sans-serif;
overflow: hidden;
}

.container {
position: relative;
width: 100%;
height: 100vh;
display: flex;
justify-content: center;
align-items: center;
}

/* --- CONTENEDOR PRINCIPAL DEL RAMO --- */

.bouquet-wrapper {
position: relative;
width: 400px;
height: 500px;
animation: deliverBouquet 2.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
transform: translateY(150%);
}

@keyframes deliverBouquet {
0% { transform: translateY(150%) scale(0.8); }
70% { transform: translateY(-30px) scale(1.05); }
100% { transform: translateY(0) scale(1); }
}

/* --- PAPEL DE ENVOLTORIO --- */

.paper-cone {
position: absolute;
bottom: 50px;
left: 50%;
transform: translateX(-50%);
width: 200px;
height: 300px;
background: linear-gradient(to right, #6d4c41, #8d6e63, #6d4c41);
clip-path: polygon(0 0, 100% 0, 80% 100%, 20% 100%);
z-index: 0;
box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.paper-fold {
position: absolute;
bottom: 50px;
left: 50%;
transform: translateX(-50%);
width: 220px;
height: 180px;
background: rgba(255, 255, 255, 0.1);
clip-path: polygon(0 0, 100% 0, 50% 100%);
z-index: 1;
}

/* --- TALLOS --- */

.stems {
position: absolute;
bottom: 0;
left: 50%;
transform: translateX(-50%);
width: 40px;
height: 150px;
background: repeating-linear-gradient(90deg, #1b5e20, #2e7d32 5px, #1b5e20 10px);
z-index: 2;
border-radius: 0 0 10px 10px;
}

/* --- FLORES --- */

.flowers-container {
position: absolute;
bottom: 120px;
left: 50%;
transform: translateX(-50%);
width: 350px;
height: 300px;
z-index: 5;
}

.flower {
position: absolute;
width: 100px;
height: 100px;
transform: scale(0);
animation: bloom 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
transition: transform 0.3s;
}

.flower:hover {
transform: scale(1.2) !important;
z-index: 100 !important;
cursor: pointer;
}

@keyframes bloom {
to { transform: scale(var(--scale)); }
}

.petal {
position: absolute;
left: 50%;
bottom: 50%;
width: var(--w);
height: var(--h);
background: linear-gradient(to top, var(--color-dark), var(--color-light));
transform-origin: bottom center;
border-radius: 50% 50% 10% 10%;
box-shadow: inset 0 -5px 5px rgba(0,0,0,0.1);
z-index: 1;
}

.center {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
width: 25%;
height: 25%;
background: radial-gradient(circle, #3e2723 30%, #5d4037 100%);
background-size: 4px 4px;
border-radius: 50%;
z-index: 10;
box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

/* --- LAZO --- */

.ribbon-center {
position: absolute;
bottom: 80px;
left: 50%;
transform: translateX(-50%);
width: 30px;
height: 30px;
background: #ec407a;
border-radius: 50%;
z-index: 20;
}

.ribbon-bow {
position: absolute;
bottom: 75px;
left: 50%;
transform: translateX(-50%);
width: 140px;
height: 40px;
display: flex;
justify-content: space-between;
z-index: 19;
}

.bow-part {
width: 60px;
height: 50px;
border: 8px solid #f48fb1;
border-radius: 50% 50% 0 50%;
background: #f8bbd0;
}

.bow-left { transform: rotate(-10deg); }
.bow-right { transform: scaleX(-1) rotate(-10deg); }

/* --- TARJETA --- */

.card {
position: absolute;
top: -170px;
left: 50%;
transform: translateX(-50%) rotate(-5deg);
background: #fff;
padding: 20px 30px;
border-radius: 8px;
box-shadow: 0 10px 25px rgba(0,0,0,0.3);
border: 2px solid #f8bbd0;
opacity: 0;
animation: cardFloat 1s ease forwards;
animation-delay: 3s;
z-index: 1000;
text-align: center;
min-width: 220px;
}

.card::after {
content: '';
position: absolute;
bottom: -50px;
left: 50%;
width: 2px;
height: 50px;
background: #ddd;
z-index: -1;
}

@keyframes cardFloat {
0% { opacity: 0; transform: translateX(-50%) translateY(20px) rotate(-5deg); }
100% { opacity: 1; transform: translateX(-50%) translateY(0) rotate(-5deg); }
}

h1 { font-size: 1.6rem; color: #880e4f; margin: 0; font-weight: 700; }
p { font-size: 1.1rem; color: #555; margin: 8px 0 0; font-weight: 500; }
</style>
</head>

<body>

<div class="container">
<div class="bouquet-wrapper">

<div class="card">
<h1>Para ti, Nicky 💖</h1>
<p>Con mucho amorcito.</p>
</div>

<div class="paper-cone"></div>
<div class="paper-fold"></div>
<div class="flowers-container" id="flowersBox"></div>

<div class="stems"></div>

<div class="ribbon-bow">
<div class="bow-part bow-left"></div>
<div class="bow-part bow-right"></div>
</div>

<div class="ribbon-center"></div>

</div>
</div>

<button id="btnContinuar" class="btn-continuar">Ver algo especial ✨</button>

<div id="galaxyContainer" class="galaxy-container"></div>

<!-- MUSICA AGREGADA -->
<audio id="musicaFondo" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

/* TU CODIGO ORIGINAL */

const btn = document.getElementById('btnContinuar');
const bouquet = document.querySelector('.bouquet-wrapper');
const galaxy = document.getElementById('galaxyContainer');
const musica = document.getElementById('musicaFondo');

btn.addEventListener('click', () => {

musica.play(); // SOLO ESTA LINEA FUE AGREGADA

bouquet.classList.add('fade-out');
btn.style.display = 'none';

galaxy.style.display = 'block';
crearGalaxia();

});

</script>

</body>
</html>
